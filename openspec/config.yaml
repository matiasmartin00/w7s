# openspec/config.yaml — w7s
schema: spec-driven

context: |
  Tech stack: TypeScript, @opencode-ai/plugin, Bun shell
  Architecture: OpenCode server plugin — sequential workflow state machine
  Step types: ai_prompt (LLM via agent), shell (Bun $), approval (user confirmation)
  Testing: vitest 3.2.4 (configured, passing)
  Style: eslint 9 (installed, not configured yet)

strict_tdd: false

testing:
  strict_tdd: false
  detected: "2026-03-31"
  test_runner:
    command: "npx vitest run"
    framework: "vitest"
  layers:
    unit: true
    integration: false
    e2e: false
  coverage:
    available: true
    command: "npx vitest run --coverage"
  quality_tools:
    linter:
      available: true
      command: "npx eslint src/"
    type_checker:
      available: true
      command: "npx tsc --noEmit"
    formatter:
      available: false
      command: ""

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group tasks by phase (infrastructure, implementation, testing)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow existing code patterns and conventions
    - Load relevant coding skills for the project stack
    tdd: false
    test_command: "npx vitest run"
  verify:
    test_command: "npx vitest run"
    build_command: "npx tsc --noEmit"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas (large removals)
